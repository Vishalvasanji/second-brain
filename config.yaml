# Second Brain local configuration (Theo memory engine)
memory_dir: ~/.openclaw/workspace/memory
session_dir: ~/.openclaw/agents/main/sessions
memory_md: ~/.openclaw/workspace/MEMORY.md

ollama:
  host: http://localhost:11434
  embedding_model: nomic-embed-text
  generation_model: llama3.2

memory:
  daily_globs:
    - "*.md"
    - "daily/*.md"
  handbook_dir: handbook
  agents_dir: agents
  lessons_file: lessons-learned.md
  archives_dir: archives

index:
  dir: .index
  faiss_path: .index/vectors.faiss
  sqlite_path: .index/chunks.sqlite
  manifest_path: .index/manifest.json
  graph_path: .index/graph.sqlite

search:
  max_results: 10
  default_scope: shared
  ranking_weights:
    similarity: 0.68
    authority: 0.18
    recency: 0.10
    scope: 0.08
    archive_penalty: 0.04

consolidation:
  interval_days: 7
  min_score: 0.5

compaction:
  enabled: true
  max_memory_md_bytes: 240000
  max_memory_md_tokens: 50000
  weekly_schedule_enabled: true
  weekly_day: sunday
  compaction_version: v1

scoring:
  decay_half_life_days: 14
  category_weights:
    decisions: 1.5
    preferences: 1.3
    facts: 1.0
    action_items: 1.2
    technical_details: 1.1
    people_mentioned: 1.0
    key_topics: 0.9
    transient: 0.5
  frequency_boost: 1.2
  max_score: 5.0

pipeline:
  extract_recent: true
  update_scores: true
  consolidate: false
  generate_report: true
